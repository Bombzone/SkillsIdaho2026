<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us - Aurora Coffee Roasters</title>
        <link rel="stylesheet" href="./css/style.css">
        <link rel="stylesheet" href="./css/contact.css">
        <link rel="shortcut icon" href="images/Logo.svg" type="image/x-icon">

    </head>
    <body>
        <nav-bar></nav-bar>
        <main class="contact">
            <form>
                <div class="form-group">
                    <label>Name:</label>
                    <input required type="text" name="name" id="name" placeholder="Enter Your Name">
                </div>
                <div class="form-group">
                <label>Email:</label>
                <input required type="email" name="email" id="email" placeholder="Enter Your Email">
                </div>
                <div class="form-group">
                    <label>Message:</label>
                    <textarea required name="message" id="message" placeholder="Enter Your Message"></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </main>
    <custom-footer></custom-footer>
        
        <script src="js/main.js"></script>
    </body>
</html>
